<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء بيانات - شغلني</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 text-center">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">إنشاء بيانات تجريبية</h1>
        <p class="text-gray-600 mb-4">اضغط الزر لإنشاء بياناتك في Firebase</p>
        <button id="createBtn" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
            إنشاء البيانات
        </button>
        <div id="status" class="mt-4 text-sm"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

                btn.disabled = true;
                return;

                        message: 'تم نشر 3 وظائف جديدة تطابق مهاراتك (React, Node.js)',
