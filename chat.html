<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدردشة - شغلني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        .msg-sent { background: #2563eb; color: white; align-self: flex-start; }
        .msg-received { background: white; color: #1f2937; align-self: flex-end; border: 1px solid #e5e7eb; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; margin: 4px 0; word-wrap: break-word; }
        #messages { display: flex; flex-direction: column; height: calc(100vh - 160px); overflow-y: auto; padding: 16px; }
        .online { color: #10b981; }
        .offline { color: #9ca3af; }
    </style>
</head>
<body>
    <!-- هيدر بسيط -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="shagelnie.png.png" alt="شغلني" class="h-10">
                <a href="employee_listing_page.html" class="text-gray-600 hover:text-blue-600"><i class="fas fa-arrow-right"></i> رجوع</a>
            </div>
            <div id="userStatus" class="text-sm text-gray-500"></div>
        </div>
    </header>

    <!-- نافذة تسجيل الدخول -->
    <div id="loginModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-xl text-center max-w-sm w-full mx-4">
            <i class="fas fa-lock text-4xl text-blue-600 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">تسجيل الدخول مطلوب</h2>
            <p class="text-gray-500 mb-6">يجب تسجيل الدخول للتواصل</p>
            <a href="login.html" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">تسجيل الدخول</a>
        </div>
    </div>

    <!-- واجهة الدردشة -->
    <div class="container mx-auto max-w-3xl bg-white min-h-screen shadow-lg">
        <!-- معلومات الطرف الآخر -->
        <div class="p-4 border-b flex items-center gap-3 bg-gray-50">
            <img id="partnerImg" src="https://randomuser.me/api/portraits/men/32.jpg" class="w-12 h-12 rounded-full object-cover">
            <div>
                <h3 id="partnerName" class="font-bold text-lg">جاري التحميل...</h3>
                <p id="partnerStatus" class="text-sm"><i class="fas fa-circle text-xs"></i> <span>غير متصل</span></p>
            </div>
        </div>

        <!-- الرسائل -->
        <div id="messages"></div>

        <!-- إدخال الرسالة -->
        <div class="p-4 border-t bg-white sticky bottom-0 flex gap-2">
            <input type="text" id="msgInput" class="flex-1 border rounded-full px-4 py-2 outline-none focus:border-blue-500" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="w-10 h-10 bg-blue-600 text-white rounded-full hover:bg-blue-700 flex items-center justify-center">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
          authDomain: "shaglni-c64c0.firebaseapp.com",
          databaseURL: "https://shaglni-c64c0-default-rtdb.firebaseio.com",
          projectId: "shaglni-c64c0",
          storageBucket: "shaglni-c64c0.firebasestorage.app",
          messagingSenderId: "768887356636",
          appId: "1:768887356636:web:11ec1d6991add3309c8819"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // قراءة معلمات URL
        const url = new URLSearchParams(location.search);
        const partnerId = url.get('employeeId');
        const partnerName = decodeURIComponent(url.get('employeeName') || 'موظف');
        const partnerPhoto = decodeURIComponent(url.get('employeePhoto') || 'https://randomuser.me/api/portraits/men/32.jpg');

        let currentUser = null;
        let chatId = null;

        // عرض معلومات الطرف الآخر
        document.getElementById('partnerName').textContent = partnerName;
        document.getElementById('partnerImg').src = partnerPhoto;

        // مراقبة تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById('loginModal').classList.remove('hidden');
                return;
            }

            currentUser = user;
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('userStatus').textContent = user.email || user.uid.substring(0, 8);

            // إنشاء معرف المحادثة
            chatId = user.uid < partnerId ? user.uid + '_' + partnerId : partnerId + '_' + user.uid;

            // ✅ تحديث حالة الاتصال
            const myStatusRef = ref(db, 'userStatus/' + user.uid);
            set(myStatusRef, { online: true, lastSeen: Date.now() });
            onDisconnect(myStatusRef).set({ online: false, lastSeen: Date.now() });

            // ✅ مراقبة حالة الطرف الآخر
            onValue(ref(db, 'userStatus/' + partnerId), (snap) => {
                const data = snap.val();
                const statusEl = document.getElementById('partnerStatus');
                if (data && data.online) {
                    statusEl.innerHTML = '<i class="fas fa-circle text-xs online"></i> <span>متصل الآن</span>';
                } else {
                    const time = data ? new Date(data.lastSeen).toLocaleTimeString('ar') : '';
                    statusEl.innerHTML = '<i class="fas fa-circle text-xs offline"></i> <span>آخر ظهور ' + time + '</span>';
                }
            });

            // ✅ تحميل الرسائل السابقة
            loadMessages();
        });

        // تحميل الرسائل
        function loadMessages() {
            const msgRef = ref(db, 'messages/' + chatId);

            onChildAdded(msgRef, (snap) => {
                const msg = snap.val();
                displayMsg(msg);
            });
        }

        // عرض رسالة
        function displayMsg(msg) {
            const div = document.createElement('div');
            const isMe = msg.senderId === currentUser.uid;
            div.className = 'msg ' + (isMe ? 'msg-sent' : 'msg-received');

            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = `
                <div>${escapeHtml(msg.text)}</div>
                <div class="text-xs opacity-70 mt-1">${time}</div>
            `;

            document.getElementById('messages').appendChild(div);
            scrollBottom();
        }

        // إرسال رسالة
        window.sendMsg = async function() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentUser || !chatId) return;

            input.value = '';

            // ✅ حفظ الرسالة
            await push(ref(db, 'messages/' + chatId), {
                text: text,
                senderId: currentUser.uid,
                receiverId: partnerId,
                timestamp: Date.now()
            });

            // ✅ تحديث آخر رسالة (للقائمة الجانبية)
            await set(ref(db, 'chats_metadata/' + chatId + '/lastMessage'), {
                text: text,
                senderId: currentUser.uid,
                timestamp: Date.now()
            });
        };

        // التمرير للأسفل
        function scrollBottom() {
            const box = document.getElementById('messages');
            box.scrollTop = box.scrollHeight;
        }

        // تجنب XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
