    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
            authDomain: "shaglni-c64c0.firebaseapp.com",
            projectId: "shaglni-c64c0",
            storageBucket: "shaglni-c64c0.firebasestorage.app",
            messagingSenderId: "768887356636",
            appId: "1:768887356636:web:11ec1d6991add3309c8819"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // عناصر DOM
        const employeesList = document.getElementById('employeesList');
        const noEmployeesFound = document.getElementById('noEmployeesFound');
        const searchInput = document.getElementById('searchInput');
        const stateFilter = document.getElementById('stateFilter');
        const cityFilter = document.getElementById('cityFilter');
        const skillFilter = document.getElementById('skillFilter');

        let allEmployees = [];

        let swiperInstance = null;

        let activeFilter = 'all';

        // المدن حسب الولاية
        const citiesByState = {
            'الخرطوم': ['الخرطوم', 'أم درمان', 'بحري', 'جبل أولياء'],
            'الجزيرة': ['ود مدني', 'الحصاحيصا', 'المناقل', 'الكاملين'],
            'البحر الأحمر': ['بورتسودان', 'سواكن', 'طوكر', 'هيا'],
            'كسلا': ['كسلا', 'حلفا الجديدة', 'أروما', 'تلبس'],
            'القضارف': ['القضارف', 'القلابات', 'الفو', 'باسندة'],
            'سنار': ['سنار', 'الدالي والمزموم', 'ود النيل', 'سنجة'],
            'النيل الأبيض': ['ربك', 'كوستي', 'الدويم', 'القطينة'],
            'النيل الأزرق': ['الدمازين', 'الروصيرص', 'الكرمك', 'القريشة'],
            'الشمالية': ['دنقلا', 'عطبرة', 'كريمة', 'الدبة'],
            'نهر النيل': ['الدامر', 'شندي', 'عطبرة', 'المتمة'],
            'شمال كردفان': ['الأبيض', 'أم روابة', 'الرهد', 'سودري'],
            'جنوب كردفان': ['كادقلي', 'أبو جبيهة', 'تلودي', 'الفولة'],
            'غرب كردفان': ['الفولة', 'النهود', 'المجلد', 'بابنوسة'],
            'شمال دارفور': ['الفاشر', 'كبكابية', 'مليط', 'السريف'],
            'جنوب دارفور': ['نيالا', 'الضعين', 'برام', 'كاس'],
            'غرب دارفور': ['الجنينة', 'كرينك', 'كلبس', 'زالنجي'],
            'وسط دارفور': ['زالنجي', 'ودعة', 'أم دخن'],
            'شرق دارفور': ['الضعين', 'عديلة', 'أبوكارنكا', 'الفردوس']
        };

        // دالة Haversine لحساب المسافة [^2^]
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // نصف قطر الأرض بالكيلومتر
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // جلب الموقع
        window.getUserLocation = function() {
            if (!navigator.geolocation) {
                alert('المتصفح لا يدعم خدمة الموقع الجغرافي');
                return;
            }

            locationBtn.classList.add('loading');
            locationBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تحديد الموقع...';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    // تحديد أقرب ولاية/مدينة (تقريبي)
                    determineNearestCity(userLocation.lat, userLocation.lng);
                    
                    locationBtn.classList.remove('loading');
                    locationBtn.innerHTML = '<i class="fas fa-check"></i> تم تحديد الموقع';
                    locationBtn.style.background = 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)';
                    
                    // تفعيل فلتر الأقرب
                    nearbyFilter.click();
                    filterAndRenderEmployees();
                },
                (error) => {
                    console.error('خطأ في تحديد الموقع:', error);
                    alert('تعذر تحديد الموقع. يرجى اختيار الولاية والمدينة يدوياً.');
                    locationBtn.classList.remove('loading');
                    locationBtn.innerHTML = '<i class="fas fa-location-arrow"></i> الأقرب لي';
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        };

        // تحديد أقرب مدينة (تقريبي)
        function determineNearestCity(lat, lng) {
            // إحداثيات تقريبية للمدن الرئيسية
            const cityCoords = {
                'الخرطوم': { lat: 15.5007, lng: 32.5599 },
                'أم درمان': { lat: 15.6475, lng: 32.4807 },
                'بحري': { lat: 15.6340, lng: 32.5326 },
                'بورتسودان': { lat: 19.6167, lng: 37.2167 },
                'ود مدني': { lat: 14.4000, lng: 33.5200 }
            };

            let nearestCity = 'الخرطوم';
            let minDistance = Infinity;

            for (const [city, coords] of Object.entries(cityCoords)) {
                const dist = calculateDistance(lat, lng, coords.lat, coords.lng);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestCity = city;
                }
            }

            // تحديث الفلاتر
            for (const [state, cities] of Object.entries(citiesByState)) {
                if (cities.includes(nearestCity)) {
                    stateFilter.value = state;
                    updateCitiesList();
                    setTimeout(() => {
                        cityFilter.value = nearestCity;
                    }, 100);
                    break;
                }
            }
        }

        // جلب البيانات
        async function fetchData() {
            try {
                // جلب الموظفين
                const employeesQuery = query(collection(db, "employees"), orderBy("timestamp", "desc"));
                const employeesSnapshot = await getDocs(employeesQuery);
                allEmployees = employeesSnapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data(),
                    // بيانات افتراضية للتقييم إذا لم تكن موجودة
                    averageRating: doc.data().averageRating || (Math.random() * 2 + 3).toFixed(1),
                    totalReviews: doc.data().totalReviews || Math.floor(Math.random() * 50) + 5,
                    coordinates: doc.data().coordinates || null
                }));

                // جلب التقييمات
                const ratingsSnapshot = await getDocs(collection(db, "ratings"));
                allRatings = ratingsSnapshot.docs.map(doc => doc.data());

                // تحديث إحصائيات التقييمات
                updateEmployeesRatings();

                filterAndRenderEmployees();
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                employeesList.innerHTML = `
                    <div class="col-span-full text-center py-20 text-red-500">
                        <i class="fas fa-exclamation-circle text-4xl mb-4"></i>
                        <p>حدث خطأ أثناء تحميل البيانات</p>
                    </div>
                `;
            }
        }

        // تحديث تقييمات الموظفين
        function updateEmployeesRatings() {
            allEmployees.forEach(emp => {
                const empRatings = allRatings.filter(r => r.reviewedId === emp.id);
                if (empRatings.length > 0) {
                    const avg = empRatings.reduce((sum, r) => sum + (r.overall || 0), 0) / empRatings.length;
                    emp.averageRating = avg.toFixed(1);
                    emp.totalReviews = empRatings.length;
                }
            });
        }

        // حساب درجة القرب
        function calculateProximityScore(employee) {
            if (!userLocation) return -1;
            
            const empState = employee.contact?.location?.state;
            const empCity = employee.contact?.location?.city;
            const empCoords = employee.coordinates;

            // إذا كان لدينا إحداثيات دقيقة
            if (empCoords && empCoords.lat && empCoords.lng) {
                const distance = calculateDistance(
                    userLocation.lat, userLocation.lng,
                    empCoords.lat, empCoords.lng
                );
                return { score: 1000 - distance, distance: distance.toFixed(1) };
            }

            // إذا نفس المدينة
            const userCity = cityFilter.value;
            if (userCity && empCity === userCity) {
                return { score: 500, label: 'نفس المدينة' };
            }

            // إذا نفس الولاية
            const userState = stateFilter.value;
            if (userState && empState === userState) {
                return { score: 100, label: 'نفس الولاية' };
            }

            return { score: 0, label: 'بعيد' };
        }

        // تصيير البطاقة
        function renderEmployeeCard(employee) {
            const skillsHtml = Array.isArray(employee.skills) && employee.skills.length > 0
                ? employee.skills.slice(0, 3).map(skill => `<span class="skill-tag">${skill}</span>`).join('') +
                  (employee.skills.length > 3 ? `<span class="skill-tag">+${employee.skills.length - 3}</span>` : '')
                : '<span class="text-gray-400 text-sm">لا توجد مهارات</span>';

            const statusClass = employee.jobStatus === 'متاح للعمل' ? 'status-available' : 'status-not-looking';
            const statusText = employee.jobStatus === 'متاح للعمل' ? 'متاح للعمل' : 'غير متاح';

            const employeeCity = employee.contact?.location?.city || 'غير محدد';
            const employeeState = employee.contact?.location?.state || 'غير محدد';

            const profilePhotoURL = employee.profileImageUrl || 'https://via.placeholder.com/150';

            const previousWorksHtml = Array.isArray(employee.previousWorksUrls) && employee.previousWorksUrls.length > 0
                ? `<div class="previous-works-gallery mt-3">
                    ${employee.previousWorksUrls.slice(0, 4).map((url, index) => `
                        <img src="${url}" alt="عمل سابق" onclick="openModal('${employee.id}', ${index}, 'works')" loading="lazy">
                    `).join('')}
                   </div>`
                : '';

            // نظام التقييمات
            const rating = parseFloat(employee.averageRating) || 0;
            const starsHtml = Array(5).fill(0).map((_, i) => 
                `<i class="fas fa-star ${i < Math.floor(rating) ? '' : 'text-gray-300'}"></i>`
            ).join('');

            // شارة القرب
            let proximityHtml = '';
            if (userLocation) {
                const prox = calculateProximityScore(employee);
                if (prox.score > 0) {
                    const proxClass = prox.distance ? 'proximity-same-city' : 
                                     (prox.label === 'نفس المدينة' ? 'proximity-same-city' : 
                                      (prox.label === 'نفس الولاية' ? 'proximity-same-state' : 'proximity-far'));
                    const proxText = prox.distance ? `${prox.distance} كم` : prox.label;
                    proximityHtml = `<span class="proximity-badge ${proxClass}"><i class="fas fa-map-marker-alt"></i> ${proxText}</span>`;
                }
            }

            return `
                <div class="employee-card">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <img src="${profilePhotoURL}" alt="${employee.name}" 
                                     class="w-16 h-16 rounded-full object-cover border-2 border-blue-100 cursor-pointer"
                                     onclick="openModal('${employee.id}', 0, 'profile')">
                                <div>
                                    <h3 class="font-bold text-lg text-gray-800">${employee.name || 'موظف'}</h3>
                                    <p class="text-blue-600 text-sm font-medium">${employee.headline || 'مبدع مستقل'}</p>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="${statusClass} text-xs px-2 py-1 rounded-full">${statusText}</span>
                                        ${proximityHtml}
                                    </div>
                                </div>
                            </div>
                            <div class="text-left">
                                <div class="rating-badge">
                                    <i class="fas fa-star"></i>
                                    <span>${rating.toFixed(1)}</span>
                                </div>
                                <div class="text-xs text-gray-500 mt-1">${employee.totalReviews || 0} تقييم</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="rating-stars mb-1">${starsHtml}</div>
                        </div>

                        <p class="text-gray-600 text-sm mb-3 line-clamp-2">${employee.bio?.substring(0, 120) || 'لا توجد نبذة شخصية'}...</p>

                        <div class="flex flex-wrap gap-1 mb-3">
                            ${skillsHtml}
                        </div>

                        ${previousWorksHtml}

                        <div class="flex items-center justify-between pt-4 border-t border-gray-100 mt-4">
                            <div class="flex items-center gap-4 text-sm text-gray-500">
                                <span class="flex items-center gap-1">
                                    <i class="fas fa-map-marker-alt text-blue-500"></i>
                                    ${employeeCity}
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fas fa-briefcase text-blue-500"></i>
                                    ${employee.experience || 'غير محدد'}
                                </span>
                            </div>
                        </div>

                        <div class="flex gap-2 mt-4">
                            <a href="chat.html?employeeId=${employee.id}&employeeName=${encodeURIComponent(employee.name)}&employeePhoto=${encodeURIComponent(employee.profileImageUrl)}"
                               class="flex-1 bg-blue-600 text-white text-center py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                                <i class="fas fa-comment-dots ml-1"></i> تواصل
                            </a>
                            <button onclick="hireEmployee('${employee.id}')"
                                    class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition font-medium">
                                <i class="fas fa-user-plus ml-1"></i> توظيف
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // التصيير الرئيسي
        function renderEmployees(employees) {
            if (employees.length === 0) {
                employeesList.innerHTML = '';
                noEmployeesFound.classList.remove('hidden');
                resultsCount.textContent = '0 نتيجة';
                return;
            }

            noEmployeesFound.classList.add('hidden');
            employeesList.innerHTML = employees.map(emp => renderEmployeeCard(emp)).join('');
            resultsCount.textContent = `${employees.length} موظف`;
        }

        // الفلترة والترتيب
        function filterAndRenderEmployees() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedState = stateFilter.value;
            const selectedCity = cityFilter.value;
            const selectedSkill = skillFilter.value;

            let filtered = allEmployees.filter(employee => {
                const searchMatch = !searchTerm || 
                    `${employee.name} ${employee.headline} ${employee.bio} ${employee.skills?.join(' ')}`.toLowerCase().includes(searchTerm);
                
                const stateMatch = !selectedState || employee.contact?.location?.state === selectedState;
                const cityMatch = !selectedCity || employee.contact?.location?.city === selectedCity;
                const skillMatch = !selectedSkill || employee.skills?.some(s => s.includes(selectedSkill));

                // فلتر التوفر
                if (activeFilter === 'available' && employee.jobStatus !== 'متاح للعمل') return false;
                
                // فلتر الأعلى تقييماً
                if (activeFilter === 'top-rated' && parseFloat(employee.averageRating) < 4.0) return false;

                return searchMatch && stateMatch && cityMatch && skillMatch;
            });

            // ترتيب حسب القرب إذا كان مفعلاً
            if (activeFilter === 'nearby' && userLocation) {
                filtered.sort((a, b) => {
                    const scoreA = calculateProximityScore(a).score;
                    const scoreB = calculateProximityScore(b).score;
                    return scoreB - scoreA;
                });
            } else if (activeFilter === 'top-rated') {
                filtered.sort((a, b) => parseFloat(b.averageRating) - parseFloat(a.averageRating));
            }

            renderEmployees(filtered);
        }

        // تحديث قائمة المدن
        function updateCitiesList() {
            const selectedState = stateFilter.value;
            cityFilter.innerHTML = '<option value="">جميع المدن</option>';
            cityFilter.disabled = true;

            if (selectedState && citiesByState[selectedState]) {
                citiesByState[selectedState].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    cityFilter.appendChild(option);
                });
                cityFilter.disabled = false;
            }
        }

        // فلترات سريعة
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                activeFilter = this.dataset.filter;
                filterAndRenderEmployees();
            });
        });

        // الأحداث
        searchInput.addEventListener('input', filterAndRenderEmployees);
        stateFilter.addEventListener('change', () => {
            updateCitiesList();
            filterAndRenderEmployees();
        });
        cityFilter.addEventListener('change', filterAndRenderEmployees);
        skillFilter.addEventListener('change', filterAndRenderEmployees);

        // توظيف
        window.hireEmployee = async function(employeeId) {
            const user = auth.currentUser;
            if (!user) {
                alert("يجب عليك تسجيل الدخول لتوظيف الموظفين.");
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const { addDoc, collection, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
                await addDoc(collection(db, "hiringRequests"), {
                    employerId: user.uid,
                    employeeId: employeeId,
                    status: 'pending',
                    timestamp: serverTimestamp()
                });
                alert("تم إرسال طلب التوظيف بنجاح! سيتم إشعار الموظف.");
            } catch (error) {
                console.error("خطأ في التوظيف:", error);
                alert("حدث خطأ أثناء إرسال الطلب.");
            }
        };

        // المودال
        window.openModal = function(employeeId, index, galleryType) {
            const employee = allEmployees.find(emp => emp.id === employeeId);
            if (!employee) return;

            let images = [];
            if (galleryType === 'profile') {
                images.push(employee.profileImageUrl || 'https://via.placeholder.com/400');
            } else if (galleryType === 'works') {
                images = employee.previousWorksUrls || [];
            }

            if (images.length === 0) return;

            const swiperWrapper = document.querySelector('.swiper-wrapper');
            swiperWrapper.innerHTML = images.map(url => `
                <div class="swiper-slide">
                    <img src="${url}" alt="صورة مكبرة" loading="lazy">
                </div>
            `).join('');

            if (swiperInstance) swiperInstance.destroy();
            
            swiperInstance = new Swiper(".mySwiper", {
                loop: images.length > 1,
                initialSlide: index,
                keyboard: { enabled: true },
            });

            imageModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = function() {
            if (swiperInstance) {
                swiperInstance.destroy();
                swiperInstance = null;
            }
            imageModal.style.display = "none";
            document.body.style.overflow = '';
        };

        // القائمة الجانبية
        const menuButton = document.getElementById('mobile-menu-button');
        const closeButton = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');

        menuButton.addEventListener('click', () => mobileMenu.classList.add('open'));
        closeButton.addEventListener('click', () => mobileMenu.classList.remove('open'));

        // إغلاق المودال بالخارجية
        imageModal.addEventListener('click', (e) => {
            if (e.target === imageModal) closeModal();
        });

        // بدء التحميل
        fetchData();

        // فحص URL params للبحث
        const urlParams = new URLSearchParams(window.location.search);
        const searchParam = urlParams.get('search');
        if (searchParam) {
            searchInput.value = decodeURIComponent(searchParam);
        }
    </script>
</body>
</html>
