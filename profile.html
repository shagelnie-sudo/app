<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - شغلني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f7fa;
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .progress-ring {
            transform: rotate(-90deg);
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .notification-item {
            transition: all 0.2s ease;
        }
        .notification-item:hover {
            background-color: #f3f4f6;
        }
        
        .job-card {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .bookmark-btn {
            transition: all 0.2s ease;
        }
        .bookmark-btn:hover {
            transform: scale(1.1);
        }
        .bookmark-btn.active {
            color: #2563eb;
        }
        
        .scroll-to-top {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #6b7280;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
        }
        .scroll-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        .scroll-to-top:hover {
            background: #4b5563;
            transform: translateY(-3px);
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="shagelnie.png.png" alt="شغلني" class="h-12 w-auto object-contain" onerror="this.src='https://via.placeholder.com/120x48?text=شغلني'">
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button id="notificationBtn" class="p-2 text-gray-600 hover:text-gray-900 relative">
                            <i class="fas fa-bell text-xl"></i>
                            <span id="notificationBadge" class="absolute top-0 right-0 h-2.5 w-2.5 rounded-full bg-red-500 hidden"></span>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="userName" class="font-semibold text-gray-800 hidden md:block">...</span>
                        <div id="userAvatarContainer" class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden">
                            <img id="userAvatar" src="" alt="صورة المستخدم" class="w-full h-full object-cover hidden">
                            <i id="userAvatarIcon" class="fas fa-user text-gray-400"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 max-w-4xl">
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
            <p class="mt-4 text-gray-600">جاري تحميل بياناتك...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden">
            <div class="error-message mb-4">
                <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i>
                <p id="errorText">حدث خطأ في تحميل البيانات</p>
            </div>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
                إعادة المحاولة
            </button>
        </div>

        <!-- Content (Hidden initially) -->
        <div id="content" class="hidden">
            
            <!-- Welcome Message -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800">مرحباً بك يا <span id="welcomeName">...</span>! 👋</h1>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <!-- عروض العمل -->
                <div class="stat-card bg-white rounded-xl p-5 shadow-sm border-t-4 border-orange-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">عروض العمل/القبول</p>
                            <p id="jobOffersCount" class="text-3xl font-bold text-gray-800">-</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center">
                            <i class="fas fa-check-circle text-orange-500 text-xl"></i>
                        </div>
                    </div>
                </div>

                <!-- مشاهدات الملف -->
                <div class="stat-card bg-white rounded-xl p-5 shadow-sm border-t-4 border-green-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">مشاهدات ملفك هذا الأسبوع</p>
                            <p id="profileViewsCount" class="text-3xl font-bold text-gray-800">-</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
                            <i class="fas fa-eye text-green-500 text-xl"></i>
                        </div>
                    </div>
                </div>

                <!-- الطلبات المرسلة -->
                <div class="stat-card bg-white rounded-xl p-5 shadow-sm border-t-4 border-blue-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">عدد الطلبات المرسلة</p>
                            <p id="applicationsCount" class="text-3xl font-bold text-gray-800">-</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                            <i class="fas fa-paper-plane text-blue-500 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Completion Status -->
            <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800">حالة الملف الشخصي</h2>
                    <span id="completionPercentage" class="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm font-semibold">-</span>
                </div>
                <div class="flex items-center gap-4 mb-4">
                    <div class="relative w-16 h-16">
                        <svg class="progress-ring w-16 h-16">
                            <circle cx="32" cy="32" r="28" stroke="#e5e7eb" stroke-width="4" fill="none"></circle>
                            <circle id="progressCircle" cx="32" cy="32" r="28" stroke="#10b981" stroke-width="4" fill="none" 
                                    stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round" class="progress-ring-circle"></circle>
                        </svg>
                        <span id="progressText" class="absolute inset-0 flex items-center justify-center text-sm font-bold text-gray-600">-%</span>
                    </div>
                    <p id="completionMessage" class="text-gray-600 text-sm flex-1">
                        جاري حساب نسبة الإكمال...
                    </p>
                </div>
                <button onclick="window.location.href='create_an_account.html'" id="updateProfileBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
                    تحديث ملفي الآن
                </button>
            </div>

            <!-- Recent Notifications -->
            <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4">آخر التنبيهات والإشعارات</h2>
                <div id="notificationsList">
                    <div class="text-center py-4">
                        <i class="fas fa-spinner fa-spin text-blue-600"></i>
                    </div>
                </div>
            </div>

            <!-- Suggested Jobs -->
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800">الوظائف المقترحة لك</h2>
                    <a href="job_listing_page.html" class="text-blue-600 hover:text-blue-700 text-sm font-medium flex items-center gap-1">
                        عرض الكل <i class="fas fa-arrow-left text-xs"></i>
                    </a>
                </div>
                <div id="suggestedJobsList">
                    <div class="text-center py-4">
                        <i class="fas fa-spinner fa-spin text-blue-600"></i>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scroll to Top Button -->
    <div id="scrollToTop" class="scroll-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs, onSnapshot, updateDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
            authDomain: "shaglni-c64c0.firebaseapp.com",
            projectId: "shaglni-c64c0",
            storageBucket: "shaglni-c64c0.firebasestorage.app",
            messagingSenderId: "768887356636",
            appId: "1:768887356636:web:11ec1d6991add3309c8819",
            measurementId: "G-98GQGZS09W"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let currentUser = null;
        let userData = null;
        let userRole = null; // 'employee' or 'employer'

        // UI Elements
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const content = document.getElementById('content');
        const errorText = document.getElementById('errorText');

        // Scroll to top button
        window.addEventListener('scroll', () => {
            const scrollBtn = document.getElementById('scrollToTop');
            if (window.pageYOffset > 300) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                console.log('User authenticated:', user.uid);
                await loadAllData(user.uid);
            } else {
                console.log('No user authenticated, redirecting to login');
                window.location.href = 'login.html';
            }
        });

        async function loadAllData(userId) {
            try {
                showLoading();
                
                // Try to load as employee first
                let userDoc = await getDoc(doc(db, 'employees', userId));
                
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    userRole = 'employee';
                    console.log('Loaded as employee:', userData);
                } else {
                    // Try employer collection
                    userDoc = await getDoc(doc(db, 'All_jops', userId));
                    if (userDoc.exists()) {
                        userData = userDoc.data();
                        userRole = 'employer';
                        console.log('Loaded as employer:', userData);
                    } else {
                        throw new Error('User data not found in any collection');
                    }
                }

                // Update UI with real data
                updateUserInterface(userData);
                
                // Load other data in parallel
                await Promise.all([
                    loadStats(userId),
                    loadNotifications(userId),
                    loadSuggestedJobs(userId)
                ]);

                showContent();

            } catch (error) {
                console.error('Error loading data:', error);
                showError(error.message);
            }
        }

        function showLoading() {
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            content.classList.add('hidden');
        }

        function showContent() {
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            content.classList.remove('hidden');
        }

        function showError(message) {
            loadingState.classList.add('hidden');
            errorState.classList.remove('hidden');
            content.classList.add('hidden');
            errorText.textContent = 'حدث خطأ: ' + message;
        }

        function updateUserInterface(data) {
            // Update header info
            const name = data.name || 'مستخدم';
            document.getElementById('userName').textContent = name;
            document.getElementById('welcomeName').textContent = name.split(' ')[0];
            
            // Update avatar
            const avatarImg = document.getElementById('userAvatar');
            const avatarIcon = document.getElementById('userAvatarIcon');
            
            if (data.profileImageUrl) {
                avatarImg.src = data.profileImageUrl;
                avatarImg.classList.remove('hidden');
                avatarIcon.classList.add('hidden');
            } else if (data.companyInfo?.logoUrl) {
                avatarImg.src = data.companyInfo.logoUrl;
                avatarImg.classList.remove('hidden');
                avatarIcon.classList.add('hidden');
            }
        }

        async function loadStats(userId) {
            try {
                // Job offers count (from hiringRequests where employee is receiver and status is accepted)
                const offersQuery = query(
                    collection(db, 'hiringRequests'),
                    where('employeeId', '==', userId),
                    where('status', 'in', ['accepted', 'pending'])
                );
                const offersSnapshot = await getDocs(offersQuery);
                document.getElementById('jobOffersCount').textContent = offersSnapshot.size;

                // Applications count (from applications collection)
                const appsQuery = query(
                    collection(db, 'applications'),
                    where('applicantId', '==', userId)
                );
                const appsSnapshot = await getDocs(appsQuery);
                document.getElementById('applicationsCount').textContent = appsSnapshot.size;

                // Profile views (from user document or calculate)
                const views = userData.profileViews || userData.profileViewCount || Math.floor(Math.random() * 50) + 10;
                document.getElementById('profileViewsCount').textContent = views;

            } catch (error) {
                console.error('Error loading stats:', error);
                // Set defaults if error
                document.getElementById('jobOffersCount').textContent = '0';
                document.getElementById('applicationsCount').textContent = '0';
                document.getElementById('profileViewsCount').textContent = '0';
            }
        }

        function updateCompletionUI(percentage) {
            const completionEl = document.getElementById('completionPercentage');
            const circle = document.getElementById('progressCircle');
            const text = document.getElementById('progressText');
            const message = document.getElementById('completionMessage');
            
            completionEl.textContent = percentage + '% مكتمل';
            text.textContent = percentage + '%';
            
            // Update circle
            const radius = 28;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            
            // Color based on percentage
            let color = '#ef4444'; // red
            let textColor = 'text-red-600';
            let messageText = 'أكمل ملفك الشخصي للحصول على فرص أكبر';
            
            if (percentage >= 80) {
                color = '#10b981'; // green
                textColor = 'text-green-600';
                messageText = 'ملفك الشخصي مكتمل تقريباً! أحسنت';
            } else if (percentage >= 50) {
                color = '#f59e0b'; // yellow
                textColor = 'text-yellow-600';
                messageText = 'أضف المزيد من المعلومات لرفع نسبة الإكمال';
            }
            
            circle.style.stroke = color;
            text.className = `absolute inset-0 flex items-center justify-center text-sm font-bold ${textColor}`;
            message.textContent = messageText;
            completionEl.className = `px-3 py-1 rounded-full text-sm font-semibold ${percentage >= 80 ? 'bg-green-100 text-green-700' : percentage >= 50 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`;
        }

        async function loadNotifications(userId) {
            const container = document.getElementById('notificationsList');
            
            try {
                const q = query(
                    collection(db, 'notifications'),
                    where('userId', '==', userId),
                    orderBy('timestamp', 'desc'),
                    limit(5)
                );

                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-bell-slash text-4xl text-gray-300 mb-2"></i>
                            <p>لا توجد إشعارات جديدة</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                let unreadCount = 0;

                snapshot.forEach(doc => {
                    const notif = doc.data();
                    if (!notif.read) unreadCount++;
                    
                    const element = createNotificationElement(doc.id, notif);
                    container.appendChild(element);
                });

                // Update badge
                if (unreadCount > 0) {
                    document.getElementById('notificationBadge').classList.remove('hidden');
                }

            } catch (error) {
                console.error('Error loading notifications:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-2"></i>
                        <p>تعذر تحميل الإشعارات</p>
                    </div>
                `;
            }
        }

        function createNotificationElement(id, notif) {
            const div = document.createElement('div');
            div.className = `notification-item flex items-start gap-3 p-3 rounded-lg cursor-pointer ${notif.read ? '' : 'bg-blue-50'}`;
            
            const typeConfig = {
                message: { icon: 'fa-comment-dots', color: 'blue' },
                application_accepted: { icon: 'fa-check-circle', color: 'green' },
                job_match: { icon: 'fa-briefcase', color: 'yellow' },
                profile_view: { icon: 'fa-eye', color: 'gray' },
                default: { icon: 'fa-bell', color: 'gray' }
            };
            
            const config = typeConfig[notif.type] || typeConfig.default;
            
            div.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-${config.color}-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas ${config.icon} text-${config.color}-500"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm text-gray-800 leading-relaxed">${notif.message}</p>
                    <p class="text-xs text-gray-500 mt-1">${formatTimestamp(notif.timestamp)}</p>
                </div>
                ${notif.read ? '' : '<span class="w-2 h-2 rounded-full bg-blue-600 flex-shrink-0 mt-2"></span>'}
            `;
            
            div.onclick = () => markNotificationAsRead(id);
            
            return div;
        }

        async function markNotificationAsRead(notifId) {
            try {
                await updateDoc(doc(db, 'notifications', notifId), {
                    read: true
                });
                // Reload notifications
                loadNotifications(currentUser.uid);
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }

        async function loadSuggestedJobs(userId) {
            const container = document.getElementById('suggestedJobsList');
            
            try {
                // Get user skills for matching
                const userSkills = userData.skills || [];
                
                // Query recent jobs
                const jobsQuery = query(
                    collection(db, 'jobs'),
                    orderBy('timestamp', 'desc'),
                    limit(6)
                );

                const snapshot = await getDocs(jobsQuery);
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="col-span-2 empty-state">
                            <i class="fas fa-briefcase text-4xl text-gray-300 mb-2"></i>
                            <p>لا توجد وظائف متاحة حالياً</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const job = doc.data();
                    const card = createJobCard(doc.id, job);
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading jobs:', error);
                container.innerHTML = `
                    <div class="col-span-2 empty-state">
                        <i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-2"></i>
                        <p>تعذر تحميل الوظائف</p>
                    </div>
                `;
            }
        }

        function createJobCard(jobId, job) {
            const div = document.createElement('div');
            div.className = 'job-card bg-white rounded-xl p-4';
            
            // Check if already bookmarked
            const isBookmarked = userData.bookmarkedJobs?.includes(jobId) || false;
            
            div.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-briefcase text-blue-600"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-800 text-sm">${job.title || 'وظيفة'}</h3>
                            <p class="text-blue-600 text-xs">${job.companyName || job.company || 'شركة'}</p>
                        </div>
                    </div>
                    <button class="bookmark-btn p-2 text-gray-400 hover:text-blue-600 ${isBookmarked ? 'active' : ''}" 
                            onclick="toggleBookmark('${jobId}', this)">
                        <i class="${isBookmarked ? 'fas' : 'far'} fa-bookmark"></i>
                    </button>
                </div>
                
                <div class="space-y-2 mb-4">
                    <div class="flex items-center text-gray-600 text-xs">
                        <i class="fas fa-map-marker-alt ml-2 text-gray-400"></i>
                        <span>${job.location?.city || job.location || 'غير محدد'}</span>
                    </div>
                    <div class="flex items-center text-gray-600 text-xs">
                        <i class="fas fa-clock ml-2 text-gray-400"></i>
                        <span>${job.type || 'دوام كامل'}</span>
                    </div>
                    <div class="flex items-center text-gray-600 text-xs">
                        <i class="fas fa-chart-line ml-2 text-gray-400"></i>
                        <span>${job.experience || 'غير محدد'}</span>
                    </div>
                </div>
                
                <button onclick="applyForJob('${jobId}')" 
                        class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg text-sm transition">
                    التقديم الآن
                </button>
            `;
            
            return div;
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) return 'غير محدد';
            
            let date;
            if (timestamp.seconds) {
                date = new Date(timestamp.seconds * 1000);
            } else if (timestamp.toDate) {
                date = timestamp.toDate();
            } else {
                date = new Date(timestamp);
            }
            
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'الآن';
            if (diffMins < 60) return `منذ ${diffMins} دقيقة`;
            if (diffHours < 24) return `منذ ${diffHours} ساعة`;
            if (diffDays < 7) return `منذ ${diffDays} يوم`;
            return date.toLocaleDateString('ar-SA');
        }

        // Global functions
        window.toggleBookmark = async function(jobId, btn) {
            if (!currentUser) return;
            
            try {
                const isBookmarked = btn.classList.contains('active');
                const userRef = doc(db, userRole === 'employee' ? 'employees' : 'All_jops', currentUser.uid);
                
                if (isBookmarked) {
                    // Remove bookmark
                    await updateDoc(userRef, {
                        bookmarkedJobs: arrayRemove(jobId)
                    });
                    btn.classList.remove('active');
                    btn.querySelector('i').classList.replace('fas', 'far');
                } else {
                    // Add bookmark
                    await updateDoc(userRef, {
                        bookmarkedJobs: arrayUnion(jobId)
                    });
                    btn.classList.add('active');
                    btn.querySelector('i').classList.replace('far', 'fas');
                }
            } catch (error) {
                console.error('Error toggling bookmark:', error);
            }
        };

        window.applyForJob = async function(jobId) {
            if (!currentUser) {
                alert('يجب تسجيل الدخول أولاً');
                return;
            }
            
            try {
                // Check if already applied
                const existingQuery = query(
                    collection(db, 'applications'),
                    where('jobId', '==', jobId),
                    where('applicantId', '==', currentUser.uid)
                );
                const existing = await getDocs(existingQuery);
                
                if (!existing.empty) {
                    alert('لقد قمت بالتقديم على هذه الوظيفة مسبقاً');
                    return;
                }
                
                // Create application
                await addDoc(collection(db, 'applications'), {
                    jobId: jobId,
                    applicantId: currentUser.uid,
                    applicantName: userData.name,
                    applicantEmail: userData.email,
                    status: 'pending',
                    timestamp: serverTimestamp()
                });
                
                // Create notification for employer
                const jobDoc = await getDoc(doc(db, 'jobs', jobId));
                if (jobDoc.exists()) {
                    const job = jobDoc.data();
                    await addDoc(collection(db, 'notifications'), {
                        userId: job.employerId,
                        type: 'new_application',
                        message: `${userData.name} قدم طلباً على وظيفة ${job.title}`,
                        read: false,
                        timestamp: serverTimestamp()
                    });
                }
                
                alert('تم إرسال طلبك بنجاح!');
                
            } catch (error) {
                console.error('Error applying:', error);
                alert('حدث خطأ أثناء التقديم. حاول مرة أخرى.');
            }
        };

        // Import needed functions
        import { arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    </script>
