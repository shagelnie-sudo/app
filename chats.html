<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسائلي - شغلني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f7fa;
        }

        #mobile-menu {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        #mobile-menu.open {
            transform: translateX(0);
        }

        .chat-container {
            height: calc(100vh - 80px);
        }

        @media (max-width: 768px) {
            .chat-container {
                height: calc(100vh - 140px);
            }
        }

        .messages-area {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-sent {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .message-received {
            background-color: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
            margin-right: auto;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
            display: block;
        }

        .conversation-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .conversation-item:hover {
            background-color: #f1f5f9;
        }

        .conversation-item.active {
            background-color: #eff6ff;
            border-right: 3px solid #2563eb;
        }

        .unread-badge {
            background-color: #ef4444;
            color: white;
            font-size: 0.75rem;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: #6b7280;
            font-size: 0.875rem;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .online-status {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .offline-status {
            width: 10px;
            height: 10px;
            background-color: #9ca3af;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
        }

        .loading-spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mobile-back-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .mobile-back-btn {
                display: inline-flex;
            }
            .conversations-sidebar {
                position: fixed;
                top: 80px;
                right: 0;
                width: 100%;
                height: calc(100% - 80px);
                z-index: 40;
                background: white;
                transform: translateX(0);
                transition: transform 0.3s ease;
            }
            .conversations-sidebar.hidden-mobile {
                transform: translateX(100%);
            }
            .chat-window {
                position: fixed;
                top: 80px;
                right: 0;
                width: 100%;
                height: calc(100% - 80px);
                z-index: 50;
                background: #f8fafc;
            }
            .chat-window.hidden-mobile {
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body>

        <nav class="container mx-auto px-4 h-20 flex items-center justify-between">

                <a href="employee_listing_page.html" class="text-gray-600 py-2 border-b border-gray-100 hover:text-blue-600 transition">الموظفون</a>

    <div class="container mx-auto px-4 py-4 h-screen">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden chat-container flex">

            <!-- قائمة المحادثات -->
            <div id="conversationsSidebar" class="conversations-sidebar w-full md:w-1/3 lg:w-1/4 border-l border-gray-200 flex flex-col">
                <div class="p-4 border-b border-gray-200 bg-gray-50">
                    <h2 class="text-xl font-bold text-gray-800">رسائلي</h2>
                    <p class="text-sm text-gray-500 mt-1">محادثاتك مع الموظفين وأصحاب العمل</p>
                </div>

                <div id="conversationsList" class="flex-1 overflow-y-auto">
                    <div class="p-8 text-center text-gray-400">
                        <i class="fas fa-comments text-4xl mb-3"></i>
                        <p>جاري تحميل المحادثات...</p>
                    </div>
                </div>
            </div>

            <!-- نافذة المحادثة -->
            <div id="chatWindow" class="chat-window hidden-mobile flex-1 flex flex-col bg-slate-50">

                <div id="chatHeader" class="bg-white border-b border-gray-200 p-4 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <button id="backToList" class="mobile-back-btn md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                        <div class="relative">
                            <div id="chatPartnerAvatarPlaceholder" class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center text-white">
                                <i class="fas fa-user"></i>
                            </div>
                            <img id="chatPartnerAvatar" src="" alt="" class="w-10 h-10 rounded-full object-cover hidden">
                            <span id="chatPartnerStatus" class="offline-status"></span>
                        </div>
                        <div>
                            <h3 id="chatPartnerName" class="font-bold text-gray-800">اختر محادثة</h3>
                            <p id="chatPartnerInfo" class="text-xs text-gray-500">--</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <a id="viewProfileLink" href="#" class="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition" title="عرض الملف الشخصي">

                <div id="messagesArea" class="messages-area flex-1 p-4 space-y-3">

                        <p class="text-sm mt-2">أو اذهب إلى <a href="employee_listing_page.html" class="text-blue-600 hover:underline">قائمة الموظفين</a> للتواصل مع أحدهم</p>
                    </div>
                </div>

                <div id="typingIndicator" class="typing-indicator bg-white px-4">

                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>

                <div id="inputArea" class="bg-white border-t border-gray-200 p-4 hidden">
                    <form id="messageForm" class="flex items-end gap-2">
                        <button type="button" class="p-3 text-gray-400 hover:text-gray-600 transition rounded-full hover:bg-gray-100">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <div class="flex-1 relative">
                            <textarea 
                                id="messageInput" 
                                rows="1"
                                placeholder="اكتب رسالتك هنا..."
                                class="w-full pr-4 pl-12 py-3 bg-gray-100 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white resize-none transition-all"
                                style="min-height: 44px; max-height: 120px;"
                            ></textarea>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
          authDomain: "shaglni-c64c0.firebaseapp.com",
          databaseURL: "https://shaglni-c64c0-default-rtdb.firebaseio.com",
          projectId: "shaglni-c64c0",
          storageBucket: "shaglni-c64c0.firebasestorage.app",
          messagingSenderId: "768887356636",
          appId: "1:768887356636:web:11ec1d6991add3309c8819",
          measurementId: "G-98GQGZS09W"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const conversationsList = document.getElementById('conversationsList');
        const messagesArea = document.getElementById('messagesArea');
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const chatPartnerName = document.getElementById('chatPartnerName');
        const chatPartnerAvatar = document.getElementById('chatPartnerAvatar');
        const chatPartnerAvatarPlaceholder = document.getElementById('chatPartnerAvatarPlaceholder');
        const chatPartnerInfo = document.getElementById('chatPartnerInfo');
        const chatPartnerStatus = document.getElementById('chatPartnerStatus');
        const viewProfileLink = document.getElementById('viewProfileLink');
        const inputArea = document.getElementById('inputArea');
        const conversationsSidebar = document.getElementById('conversationsSidebar');
        const chatWindow = document.getElementById('chatWindow');
        const backToList = document.getElementById('backToList');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const loginBtn = document.getElementById('loginBtn');

        let currentUser = null;
        let currentPartnerId = null;
        let currentPartnerData = null;
        let currentChatId = null;
        let unsubscribeMessages = null;
        let unsubscribeConversations = null;
        let userDataCache = {};

        // دالة لإنشاء avatar placeholder
        function getAvatarPlaceholder(name) {
            const initial = name ? name.charAt(0).toUpperCase() : '?';
            const colors = ['bg-blue-600', 'bg-green-600', 'bg-purple-600', 'bg-orange-600', 'bg-pink-600', 'bg-teal-600'];
            const colorIndex = name ? name.charCodeAt(0) % colors.length : 0;
            return `<div class="w-full h-full rounded-full ${colors[colorIndex]} flex items-center justify-center text-white font-bold text-sm">${initial}</div>`;
        }

        // معالجة المصادقة
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                userInfo.classList.remove('hidden');
                loginBtn.classList.add('hidden');

                const userRef = ref(db, 'users/' + user.uid);
                try {
                    const userSnapshot = await get(userRef);
                    if (userSnapshot.exists()) {
                        const userData = userSnapshot.val();
                        userName.textContent = userData.name || user.displayName || 'مستخدم';
                    } else {
                        userName.textContent = user.displayName || 'مستخدم';
                    }
                } catch (e) {
                    userName.textContent = user.displayName || 'مستخدم';
                }

                loadConversations();
                checkUrlParams();
            } else {
                try {
                    const result = await signInAnonymously(auth);
                    currentUser = result.user;
                } catch (error) {
                    console.error('خطأ في تسجيل الدخول المجهول:', error);
                    conversationsList.innerHTML = `
                        <div class="p-8 text-center text-gray-400">
                            <i class="fas fa-lock text-4xl mb-3 text-red-400"></i>
                            <p class="text-red-500">يرجى تسجيل الدخول لعرض المحادثات</p>
                            <a href="login.html" class="inline-block mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">تسجيل الدخول</a>
                        </div>
                    `;
                }
            }
        });

        // إنشاء معرف المحادثة
        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? uid1 + '_' + uid2 : uid2 + '_' + uid1;
        }

        // جلب معلومات المستخدم/موظف
        async function getUserInfo(userId) {
            if (userDataCache[userId]) return userDataCache[userId];

            try {
                const empRef = ref(db, 'employees/' + userId);
                const empSnap = await get(empRef);
                if (empSnap.exists()) {
                    const data = empSnap.val();
                    const info = {
                        name: data.name || 'موظف',
                        photo: data.profileImageUrl || null
                    };
                    userDataCache[userId] = info;
                    return info;
                }

                const userRef = ref(db, 'users/' + userId);
                const userSnap = await get(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.val();
                    const info = {
                        name: data.name || 'مستخدم',
                        photo: data.profileImageUrl || null
                    };
                    userDataCache[userId] = info;
                    return info;
                }
            } catch (e) {
                console.error('خطأ في جلب معلومات المستخدم:', e);
            }

            return { name: 'مستخدم', photo: null };
        }

        // التحقق من معلمات URL
        async function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const employeeId = urlParams.get('employeeId');
            const employeeName = urlParams.get('employeeName');
            const employeePhoto = urlParams.get('employeePhoto');

            if (employeeId && currentUser) {
                await startConversationWith(employeeId, decodeURIComponent(employeeName || ''), decodeURIComponent(employeePhoto || ''));
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // بدء محادثة مع موظف
        async function startConversationWith(partnerId, partnerName, partnerPhoto) {
            currentPartnerId = partnerId;
            currentPartnerData = {
                name: partnerName || 'موظف',
                photo: partnerPhoto || null
            };
            currentChatId = getChatId(currentUser.uid, partnerId);

            chatPartnerName.textContent = currentPartnerData.name;

            // التعامل مع الصورة
            if (currentPartnerData.photo) {
                chatPartnerAvatar.src = currentPartnerData.photo;
                chatPartnerAvatar.classList.remove('hidden');
                chatPartnerAvatarPlaceholder.classList.add('hidden');
            } else {
                chatPartnerAvatarPlaceholder.innerHTML = getAvatarPlaceholder(currentPartnerData.name);
                chatPartnerAvatarPlaceholder.classList.remove('hidden');
                chatPartnerAvatar.classList.add('hidden');
            }

            chatPartnerInfo.textContent = 'غير متصل';
            chatPartnerStatus.className = 'offline-status';
            viewProfileLink.href = `employee_listing_page.html?id=${partnerId}`;
            inputArea.classList.remove('hidden');

            if (window.innerWidth < 768) {
                conversationsSidebar.classList.add('hidden-mobile');
                chatWindow.classList.remove('hidden-mobile');
            }

            // إنشاء/تحديث chats_by_user للمستخدم الحالي
            const myChatsRef = ref(db, 'chats_by_user/' + currentUser.uid + '/' + partnerId);
            await set(myChatsRef, {
                partnerId: partnerId,
                partnerName: currentPartnerData.name,
                partnerPhoto: currentPartnerData.photo || '',
                lastMessage: '',
                timestamp: Date.now(),
                unreadCount: 0
            });

            loadMessagesForChat(currentChatId);
        }

        // تحميل قائمة المحادثات من chats_by_user
        function loadConversations() {
            if (!currentUser) return;

            const chatsRef = ref(db, 'chats_by_user/' + currentUser.uid);

            unsubscribeConversations = onValue(chatsRef, async (snapshot) => {
                if (!snapshot.exists()) {
                    conversationsList.innerHTML = `
                        <div class="p-8 text-center text-gray-400">
                            <i class="fas fa-inbox text-4xl mb-3"></i>
                            <p>لا توجد محادثات بعد</p>
                            <p class="text-sm mt-2">ابدأ بالتواصل مع الموظفين من <a href="employee_listing_page.html" class="text-blue-600 hover:underline">هنا</a></p>
                        </div>
                    `;
                    return;
                }

                const chats = snapshot.val();
                const chatArray = [];

                for (const [partnerId, chatData] of Object.entries(chats)) {
                    chatArray.push({
                        partnerId,
                        ...chatData
                    });
                }

                // ترتيب حسب آخر رسالة
                chatArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                renderConversationsList(chatArray);
            }, (error) => {
                console.error('خطأ في تحميل المحادثات:', error);
                conversationsList.innerHTML = `
                    <div class="p-8 text-center text-gray-400">
                        <i class="fas fa-exclamation-circle text-4xl mb-3 text-red-400"></i>
                        <p class="text-red-500">حدث خطأ في تحميل المحادثات</p>
                        <p class="text-xs mt-2 text-gray-400">${error.message}</p>
                    </div>
                `;
            });
        }

        // عرض قائمة المحادثات
        function renderConversationsList(conversations) {
            conversationsList.innerHTML = '';

            conversations.forEach(chat => {
                const isActive = currentPartnerId === chat.partnerId;
                const timeText = formatTime(chat.timestamp);
                const lastText = chat.lastMessage || 'بدء محادثة جديدة';
                const unreadCount = chat.unreadCount || 0;
                const partnerName = chat.partnerName || 'مستخدم';
                const partnerPhoto = chat.partnerPhoto || '';

                // إنشاء avatar HTML
                let avatarHtml;
                if (partnerPhoto) {
                    avatarHtml = `<img src="${partnerPhoto}" alt="${partnerName}" class="w-12 h-12 rounded-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="w-12 h-12 rounded-full bg-gray-300 items-center justify-center text-white hidden">${getAvatarPlaceholder(partnerName)}</div>`;
                } else {
                    avatarHtml = `<div class="w-12 h-12 rounded-full bg-gray-300 flex items-center justify-center text-white">${getAvatarPlaceholder(partnerName)}</div>`;
                }

                const item = document.createElement('div');
                item.className = `conversation-item p-4 border-b border-gray-100 flex items-center gap-3 ${isActive ? 'active' : ''}`;
                item.onclick = () => openConversationWithPartner(chat.partnerId, {
                    name: partnerName,
                    photo: partnerPhoto
                });

                item.innerHTML = `
                    <div class="relative flex-shrink-0">
                        ${avatarHtml}
                        <span class="offline-status"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <h4 class="font-semibold text-gray-800 truncate">${partnerName}</h4>
                            <span class="text-xs text-gray-400 flex-shrink-0">${timeText}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <p class="text-sm text-gray-500 truncate ${unreadCount > 0 ? 'font-semibold text-gray-700' : ''}">
                                ${chat.lastMessageSender === currentUser.uid ? '<i class="fas fa-check-double text-xs ml-1 text-blue-400"></i>' : ''}
                                ${lastText}
                            </p>
                            ${unreadCount > 0 ? `<span class="unread-badge flex-shrink-0 mr-2">${unreadCount}</span>` : ''}
                        </div>
                    </div>
                `;

                conversationsList.appendChild(item);
            });
        }

        // فتح محادثة مع شريك
        async function openConversationWithPartner(partnerId, partnerData) {
            if (!currentUser) return;

            currentPartnerId = partnerId;
            currentPartnerData = partnerData;
            currentChatId = getChatId(currentUser.uid, partnerId);

            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }

            if (window.innerWidth < 768) {
                conversationsSidebar.classList.add('hidden-mobile');
                chatWindow.classList.remove('hidden-mobile');
            }

            chatPartnerName.textContent = partnerData.name;

            // التعامل مع صورة الشريك
            if (partnerData.photo) {
                chatPartnerAvatar.src = partnerData.photo;
                chatPartnerAvatar.classList.remove('hidden');
                chatPartnerAvatarPlaceholder.classList.add('hidden');
            } else {
                chatPartnerAvatarPlaceholder.innerHTML = getAvatarPlaceholder(partnerData.name);
                chatPartnerAvatarPlaceholder.classList.remove('hidden');
                chatPartnerAvatar.classList.add('hidden');
            }

            chatPartnerInfo.textContent = 'غير متصل';
            chatPartnerStatus.className = 'offline-status';
            viewProfileLink.href = `employee_listing_page.html?id=${partnerId}`;
            inputArea.classList.remove('hidden');

            // تصفير العداد
            const myChatRef = ref(db, 'chats_by_user/' + currentUser.uid + '/' + partnerId + '/unreadCount');
            await set(myChatRef, 0);

            // تحديث lastRead
            const lastReadRef = ref(db, 'chats_metadata/' + currentChatId + '/lastRead/' + currentUser.uid);
            await set(lastReadRef, Date.now());

            loadMessagesForChat(currentChatId);
        }

        // تحميل الرسائل لمحادثة محددة
        function loadMessagesForChat(chatId) {
            messagesArea.innerHTML = '<div class="flex justify-center p-8"><div class="loading-spinner"></div></div>';

            const messagesRef = ref(db, 'messages/' + chatId);

            unsubscribeMessages = onValue(messagesRef, (snapshot) => {
                if (!snapshot.exists()) {
                    messagesArea.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-handshake text-6xl mb-4 text-blue-200"></i>
                            <p class="text-lg font-medium">ابدأ محادثتك مع ${currentPartnerData?.name || 'الطرف الآخر'}</p>
                            <p class="text-sm mt-2 text-gray-400">أرسل رسالة للبدء</p>
                        </div>
                    `;
                    return;
                }

                const messages = snapshot.val();
                const messageArray = [];

                for (const [msgId, msgData] of Object.entries(messages)) {
                    messageArray.push({ id: msgId, ...msgData });
                }

                messageArray.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

                renderMessages(messageArray);

                // تحديث حالة القراءة
                markMessagesAsRead(chatId, messageArray);
            }, (error) => {
                console.error('خطأ في تحميل الرسائل:', error);
                messagesArea.innerHTML = '<div class="text-center text-red-500 p-8">حدث خطأ في تحميل الرسائل</div>';
            });
        }

        // تحديث حالة القراءة
        async function markMessagesAsRead(chatId, messages) {
            if (!currentUser) return;

            const updates = {};
            messages.forEach(msg => {
                if (msg.receiverId === currentUser.uid && !msg.read) {
                    updates['messages/' + chatId + '/' + msg.id + '/read'] = true;
                }
            });

            if (Object.keys(updates).length > 0) {
                try {
                    await update(ref(db), updates);
                } catch (e) {
                    console.error('خطأ في تحديث القراءة:', e);
                }
            }
        }

        // عرض الرسائل
        function renderMessages(messages) {
            messagesArea.innerHTML = '';
            let lastDate = null;

            messages.forEach(msg => {
                const isSent = msg.senderId === currentUser.uid;
                const messageDate = new Date(msg.timestamp || Date.now());

                const dateStr = formatDate(messageDate);
                if (dateStr !== lastDate) {
                    lastDate = dateStr;
                    const dateSeparator = document.createElement('div');
                    dateSeparator.className = 'flex justify-center my-4';
                    dateSeparator.innerHTML = `<span class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full">${dateStr}</span>`;
                    messagesArea.appendChild(dateSeparator);
                }

                const messageDiv = document.createElement('div');
                messageDiv.className = `flex ${isSent ? 'justify-start' : 'justify-end'} fade-in`;
                messageDiv.innerHTML = `
                    <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        <p>${escapeHtml(msg.text || '')}</p>
                        <span class="message-time ${isSent ? 'text-blue-200' : 'text-gray-400'}">
                            ${formatMessageTime(msg.timestamp)}
                            ${isSent ? (msg.read ? '<i class="fas fa-check-double mr-1"></i>' : '<i class="fas fa-check mr-1"></i>') : ''}
                        </span>
                    </div>
                `;
                messagesArea.appendChild(messageDiv);
            });

            scrollToBottom();
        }

        // إرسال رسالة
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const text = messageInput.value.trim();
            if (!text || !currentPartnerId || !currentUser || !currentChatId) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const messageData = {
                    text: text,
                    senderId: currentUser.uid,
                    senderName: userName.textContent || 'مستخدم',
                    receiverId: currentPartnerId,
                    timestamp: Date.now(),
                    read: false
                };

                // إضافة الرسالة
                const messagesRef = ref(db, 'messages/' + currentChatId);
                const newMessageRef = push(messagesRef);
                await set(newMessageRef, messageData);

                // تحديث chats_by_user للمستخدم الحالي
                const myChatRef = ref(db, 'chats_by_user/' + currentUser.uid + '/' + currentPartnerId);
                await update(myChatRef, {
                    lastMessage: text,
                    timestamp: Date.now(),
                    lastMessageSender: currentUser.uid,
                    partnerId: currentPartnerId,
                    partnerName: currentPartnerData?.name || 'موظف',
                    partnerPhoto: currentPartnerData?.photo || ''
                });

                // تحديث chats_by_user للطرف الآخر
                const partnerChatRef = ref(db, 'chats_by_user/' + currentPartnerId + '/' + currentUser.uid);
                const partnerChatSnapshot = await get(partnerChatRef);

                if (!partnerChatSnapshot.exists()) {
                    await set(partnerChatRef, {
                        partnerId: currentUser.uid,
                        partnerName: userName.textContent || 'مستخدم',
                        partnerPhoto: '',
                        lastMessage: text,
                        timestamp: Date.now(),
                        lastMessageSender: currentUser.uid,
                        unreadCount: 1
                    });
                } else {
                    const currentUnread = partnerChatSnapshot.val().unreadCount || 0;
                    await update(partnerChatRef, {
                        lastMessage: text,
                        timestamp: Date.now(),
                        lastMessageSender: currentUser.uid,
                        unreadCount: currentUnread + 1
                    });
                }

                messageInput.value = '';
                messageInput.style.height = '44px';
                scrollToBottom();
            } catch (error) {
                console.error('خطأ في إرسال الرسالة:', error);
                alert('حدث خطأ أثناء إرسال الرسالة: ' + error.message);
            } finally {
                sendBtn.disabled = false;
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                messageForm.dispatchEvent(new Event('submit'));
            }
        });

        backToList.addEventListener('click', () => {
            conversationsSidebar.classList.remove('hidden-mobile');
            chatWindow.classList.add('hidden-mobile');
            currentPartnerId = null;
            currentChatId = null;
            if (unsubscribeMessages) {
                unsubscribeMessages();
                unsubscribeMessages = null;
            }
        });

        // دوال تنسيق الوقت
        function formatTime(timestamp) {
            if (!timestamp) return '';

            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 24 * 60 * 60 * 1000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            }

            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.getDate() === yesterday.getDate() && date.getMonth() === yesterday.getMonth()) {
                return 'أمس';
            }

            if (diff < 7 * 24 * 60 * 60 * 1000) {
                const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                return days[date.getDay()];
            }

            return date.toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' });
        }

        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(date) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const messageDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

            if (messageDate.getTime() === today.getTime()) return 'اليوم';

            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (messageDate.getTime() === yesterday.getTime()) return 'أمس';

            return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // القائمة الجانبية
        const menuButton = document.getElementById('mobile-menu-button');
        const closeButton = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');

        menuButton.addEventListener('click', () => mobileMenu.classList.add('open'));
        closeButton.addEventListener('click', () => mobileMenu.classList.remove('open'));

        window.addEventListener('beforeunload', () => {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeConversations) unsubscribeConversations();
        });

        // تعريف الدوال في window
        window.openConversationWithPartner = openConversationWithPartner;
    </script>
</body>
</html>
