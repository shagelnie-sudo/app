<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محادثة بسيطة - شغلني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; }
        #chatBox { height: 60vh; overflow-y: auto; }
        .my-msg { background-color: #dcf8c6; align-self: flex-start; }
        .their-msg { background-color: #ffffff; align-self: flex-end; border: 1px solid #ddd; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-lg bg-white shadow-lg rounded-lg overflow-hidden">
        <div class="bg-blue-600 p-4 text-white font-bold text-center">
            مركز الرسائل - شغلني
        </div>

        <div id="chatBox" class="p-4 flex flex-col space-y-3 bg-gray-50">
            <p class="text-center text-gray-400 text-sm">اختر محادثة للبدء...</p>
        </div>

        <form id="msgForm" class="p-4 border-t flex gap-2">
            <input id="msgInput" type="text" placeholder="اكتب رسالتك..." class="flex-1 border p-2 rounded-lg outline-none focus:border-blue-500">
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">إرسال</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // إعدادات مشروعك (نفس التي في صفحة التسجيل)
        const firebaseConfig = {
            apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
            authDomain: "shaglni-c64c0.firebaseapp.com",
            databaseURL: "https://shaglni-c64c0-default-rtdb.firebaseio.com",
            projectId: "shaglni-c64c0",
            storageBucket: "shaglni-c64c0.appspot.com",
            appId: "1:768887356636:web:11ec1d6991add3309c8819"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const auth = getAuth(app);

        let user = null;
        let chatId = null;

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                initChat();
            } else {
                alert("يرجى تسجيل الدخول أولاً");
            }
        });

        function initChat() {
            const params = new URLSearchParams(window.location.search);
            const otherId = params.get('id'); // نمرر ID الشخص في الرابط

            if (otherId) {
                // إنشاء ID موحد للمحادثة
                chatId = user.uid < otherId ? `${user.uid}_${otherId}` : `${otherId}_${user.uid}`;
                loadMsgs();
            }
        }

        function loadMsgs() {
            onValue(ref(rtdb, `messages/${chatId}`), (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(m => {
                        const div = document.createElement('div');
                        const isMe = m.senderId === user.uid;
                        div.className = `p-2 rounded-lg max-w-[80%] text-sm ${isMe ? 'my-msg' : 'their-msg'}`;
                        div.textContent = m.text;
                        box.appendChild(div);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        document.getElementById('msgForm').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            if (input.value.trim() && chatId) {
                push(ref(rtdb, `messages/${chatId}`), {
                    text: input.value,
                    senderId: user.uid,
                    time: Date.now()
                });
                input.value = "";
            }
        };
    </script>
</body>
</html>
