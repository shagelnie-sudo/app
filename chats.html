<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسائلي - شغلني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f5f7fa; }
        .chat-container { height: calc(100vh - 100px); }
        .messages-area { overflow-y: auto; scrollbar-width: thin; }
        .message-bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; line-height: 1.5; margin-bottom: 8px; }
        .message-sent { background: #2563eb; color: white; margin-right: auto; border-bottom-right-radius: 4px; }
        .message-received { background: white; color: #1f2937; margin-left: auto; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
        .conversation-item.active { background-color: #eff6ff; border-right: 4px solid #2563eb; }
        .offline-status { width: 10px; height: 10px; background: #cbd5e1; border-radius: 50%; display: inline-block; }
        .online-status { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; }
        @media (max-width: 768px) {
            .hidden-mobile { display: none !important; }
        }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm h-20 flex items-center px-6">
        <img src="shagelnie.png.png" alt="شغلني" class="h-12 ml-4">
        <nav class="hidden md:flex gap-4">
            <a href="index.html" class="text-gray-600">الرئيسية</a>
            <a href="employee_listing_page.html" class="text-gray-600">الموظفون</a>
            <a href="chats.html" class="text-blue-600 font-bold">رسائلي</a>
        </nav>
    </header>

    <div class="container mx-auto px-4 py-4">
        <div class="bg-white rounded-2xl shadow-lg chat-container flex overflow-hidden">
            
            <div id="conversationsSidebar" class="w-full md:w-1/3 lg:w-1/4 border-l border-gray-100 flex flex-col bg-white">
                <div class="p-4 border-b">
                    <h2 class="text-xl font-bold">المحادثات</h2>
                </div>
                <div id="conversationsList" class="flex-1 overflow-y-auto">
                    </div>
            </div>

            <div id="chatWindow" class="hidden-mobile md:flex flex-1 flex-col bg-slate-50">
                <div class="p-4 bg-white border-b flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <button id="backBtn" class="md:hidden ml-2"><i class="fas fa-arrow-right"></i></button>
                        <div id="partnerAvatar"></div>
                        <div>
                            <h3 id="partnerName" class="font-bold text-gray-800">اختر محادثة</h3>
                            <span id="partnerStatus" class="text-xs text-gray-400">--</span>
                        </div>
                    </div>
                </div>

                <div id="messagesArea" class="flex-1 p-4 messages-area flex flex-col">
                    <div class="m-auto text-center text-gray-400">
                        <i class="fas fa-comments text-5xl mb-2"></i>
                        <p>ابدأ الدردشة الآن</p>
                    </div>
                </div>

                <div id="inputArea" class="p-4 bg-white border-t hidden">
                    <form id="messageForm" class="flex gap-2">
                        <input id="messageInput" type="text" placeholder="اكتب رسالتك..." class="flex-1 p-3 bg-gray-100 rounded-xl focus:outline-none">
                        <button type="submit" class="bg-blue-600 text-white p-3 rounded-xl w-12"><i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
            authDomain: "shaglni-c64c0.firebaseapp.com",
            databaseURL: "https://shaglni-c64c0-default-rtdb.firebaseio.com",
            projectId: "shaglni-c64c0",
            storageBucket: "shaglni-c64c0.firebasestorage.app",
            messagingSenderId: "768887356636",
            appId: "1:768887356636:web:11ec1d6991add3309c8819"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentChatId = null;
        let currentPartnerId = null;

        // 1. مراقبة المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadConversations();
                checkUrlParams();
            } else {
                signInAnonymously(auth);
            }
        });

        // 2. التحقق من الرابط (قادم من صفحة الموظفين)
        async function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const empId = params.get('employeeId');
            const empName = params.get('employeeName');

            if (empId && currentUser) {
                currentPartnerId = empId;
                currentChatId = makeChatId(currentUser.uid, empId);
                
                // تحديث الواجهة فوراً
                document.getElementById('partnerName').textContent = decodeURIComponent(empName);
                document.getElementById('inputArea').classList.remove('hidden');
                loadMessages(currentChatId);

                // إخفاء القائمة في الموبايل
                if(window.innerWidth < 768) {
                    document.getElementById('conversationsSidebar').classList.add('hidden-mobile');
                    document.getElementById('chatWindow').classList.remove('hidden-mobile');
                }
            }
        }

        // 3. إنشاء معرف محادثة فريد
        function makeChatId(id1, id2) {
            return id1 < id2 ? `${id1}_${id2}` : `${id2}_${id1}`;
        }

        // 4. تحميل قائمة المحادثات (Real-time)
        function loadConversations() {
            const chatRef = ref(rtdb, 'messages');
            onValue(chatRef, (snapshot) => {
                const listArea = document.getElementById('conversationsList');
                listArea.innerHTML = "";
                
                if (!snapshot.exists()) return;

                const allMessages = snapshot.val();
                Object.keys(allMessages).forEach(chatId => {
                    if (chatId.includes(currentUser.uid)) {
                        const partnerId = chatId.replace(currentUser.uid, "").replace("_", "");
                        const messages = Object.values(allMessages[chatId]);
                        const lastMsg = messages[messages.length - 1];

                        // إنشاء عنصر في القائمة
                        const item = document.createElement('div');
                        item.className = "p-4 border-b cursor-pointer hover:bg-gray-50 conversation-item";
                        item.innerHTML = `
                            <div class="font-bold text-sm">مستخدم: ${partnerId.substring(0,5)}...</div>
                            <div class="text-xs text-gray-500 truncate">${lastMsg.text}</div>
                        `;
                        item.onclick = () => {
                            currentChatId = chatId;
                            currentPartnerId = partnerId;
                            document.getElementById('partnerName').textContent = "محادثة " + partnerId.substring(0,5);
                            document.getElementById('inputArea').classList.remove('hidden');
                            loadMessages(chatId);
                        };
                        listArea.appendChild(item);
                    }
                });
            });
        }

        // 5. تحميل الرسائل (Real-time)
        function loadMessages(chatId) {
            const msgRef = ref(rtdb, `messages/${chatId}`);
            onValue(msgRef, (snapshot) => {
                const msgArea = document.getElementById('messagesArea');
                msgArea.innerHTML = "";
                
                if (snapshot.exists()) {
                    Object.values(snapshot.val()).forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message-bubble ${msg.senderId === currentUser.uid ? 'message-sent' : 'message-received'}`;
                        div.textContent = msg.text;
                        msgArea.appendChild(div);
                    });
                    msgArea.scrollTop = msgArea.scrollHeight;
                }
            });
        }

        // 6. إرسال رسالة
        document.getElementById('messageForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (text && currentChatId) {
                const msgData = {
                    text: text,
                    senderId: currentUser.uid,
                    timestamp: Date.now(),
                    read: false
                };
                await push(ref(rtdb, `messages/${currentChatId}`), msgData);
                input.value = "";
            }
        };

        // زر العودة للموبايل
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('conversationsSidebar').classList.remove('hidden-mobile');
            document.getElementById('chatWindow').classList.add('hidden-mobile');
        };

    </script>
</body>
</html>
