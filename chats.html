<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسائلي - شغلني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f7fa;
        }

        #mobile-menu {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        #mobile-menu.open {
            transform: translateX(0);
        }

        .chat-container {
            height: calc(100vh - 80px);
        }

        @media (max-width: 768px) {
            .chat-container {
                height: calc(100vh - 140px);
            }
        }

        .messages-area {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-sent {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .message-received {
            background-color: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
            margin-right: auto;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
            display: block;
        }

        .conversation-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .conversation-item:hover {
            background-color: #f1f5f9;
        }

        .conversation-item.active {
            background-color: #eff6ff;
            border-right: 3px solid #2563eb;
        }

        .unread-badge {
            background-color: #ef4444;
            color: white;
            font-size: 0.75rem;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: #6b7280;
            font-size: 0.875rem;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .online-status {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .offline-status {
            width: 10px;
            height: 10px;
            background-color: #9ca3af;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
        }

        .loading-spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mobile-back-btn {
            display: none;
        }

        @media (max-width: 768px) {
            .mobile-back-btn {
                display: inline-flex;
            }
            .conversations-sidebar {
                position: fixed;
                top: 80px;
                right: 0;
                width: 100%;
                height: calc(100% - 80px);
                z-index: 40;
                background: white;
                transform: translateX(0);
                transition: transform 0.3s ease;
            }
            .conversations-sidebar.hidden-mobile {
                transform: translateX(100%);
            }
            .chat-window {
                position: fixed;
                top: 80px;
                right: 0;
                width: 100%;
                height: calc(100% - 80px);
                z-index: 50;
                background: #f8fafc;
            }
            .chat-window.hidden-mobile {
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body>

    <div class="container mx-auto px-4 py-4 h-screen">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden chat-container flex">

            <!-- قائمة المحادثات -->
            <div id="conversationsSidebar" class="conversations-sidebar w-full md:w-1/3 lg:w-1/4 border-l border-gray-200 flex flex-col">
                <div class="p-4 border-b border-gray-200 bg-gray-50">

                    <p class="text-sm text-gray-500 mt-1">محادثاتك مع الموظفين وأصحاب العمل</p>
                </div>

                <div id="conversationsList" class="flex-1 overflow-y-auto">
                    <div class="p-8 text-center text-gray-400">
                        <i class="fas fa-comments text-4xl mb-3"></i>

                    </div>
                </div>
            </div>

            <!-- نافذة المحادثة -->
            <div id="chatWindow" class="chat-window hidden-mobile flex-1 flex flex-col bg-slate-50">

                <div id="chatHeader" class="bg-white border-b border-gray-200 p-4 flex items-center justify-between shadow-sm">

                <div id="messagesArea" class="messages-area flex-1 p-4 space-y-3">

                        <p class="text-sm mt-2">أو اذهب إلى <a href="employee_listing_page.html" class="text-blue-600 hover:underline">قائمة الموظفين</a> للتواصل مع أحدهم</p>
                    </div>
                </div>

                <div id="typingIndicator" class="typing-indicator bg-white px-4">
                    <span>يكتب الآن</span>
                    <div class="typing-dot"></div>

                                rows="1"
                                placeholder="اكتب رسالتك هنا..."

                                style="min-height: 44px; max-height: 120px;"

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            getDoc, 
            getDocs, 
            addDoc, 
            updateDoc,
            setDoc,
            query, 
            where, 
            orderBy, 
            onSnapshot,
            serverTimestamp,
            Timestamp,
            limit,
            or,
            and
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signInAnonymously 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBsIaCjE7QOQ6QkhqhCIMA3sLdMvxBxPHk",
          authDomain: "shaglni-c64c0.firebaseapp.com",
          projectId: "shaglni-c64c0",
          storageBucket: "shaglni-c64c0.firebasestorage.app",
          messagingSenderId: "768887356636",
          appId: "1:768887356636:web:11ec1d6991add3309c8819",
          measurementId: "G-98GQGZS09W"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const conversationsList = document.getElementById('conversationsList');
        const messagesArea = document.getElementById('messagesArea');
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const chatPartnerName = document.getElementById('chatPartnerName');
        const chatPartnerAvatar = document.getElementById('chatPartnerAvatar');
        const chatPartnerInfo = document.getElementById('chatPartnerInfo');
        const chatPartnerStatus = document.getElementById('chatPartnerStatus');
        const viewProfileLink = document.getElementById('viewProfileLink');
        const inputArea = document.getElementById('inputArea');
        const typingIndicator = document.getElementById('typingIndicator');
        const conversationsSidebar = document.getElementById('conversationsSidebar');
        const chatWindow = document.getElementById('chatWindow');
        const backToList = document.getElementById('backToList');
        const userInfo = document.getElementById('userInfo');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const loginBtn = document.getElementById('loginBtn');

        let currentUser = null;
        let currentPartnerId = null;
        let currentPartnerData = null;
        let unsubscribeMessages = null;
        let unsubscribeConversations = null;
        let allMessages = [];
        let conversationsMap = new Map();

        // معالجة المصادقة
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                userInfo.classList.remove('hidden');
                loginBtn.classList.add('hidden');

                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    userName.textContent = userData.name || user.displayName || 'مستخدم';
                    userAvatar.src = userData.profileImageUrl || user.photoURL || 'https://randomuser.me/api/portraits/men/1.jpg';
                } else {
                    userName.textContent = user.displayName || 'مستخدم';
                    userAvatar.src = user.photoURL || 'https://randomuser.me/api/portraits/men/1.jpg';
                }

                loadConversations();
                checkUrlParams();
            } else {
                try {
                    const result = await signInAnonymously(auth);
                    currentUser = result.user;
                } catch (error) {
                    console.error('خطأ في تسجيل الدخول المجهول:', error);
                    conversationsList.innerHTML = `
                        <div class="p-8 text-center text-gray-400">
                            <i class="fas fa-lock text-4xl mb-3 text-red-400"></i>
                            <p class="text-red-500">يرجى تسجيل الدخول لعرض المحادثات</p>
                            <a href="login.html" class="inline-block mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">تسجيل الدخول</a>
                        </div>
                    `;
                }
            }
        });

        // التحقق من معلمات URL
        async function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const employeeId = urlParams.get('employeeId');
            const employeeName = urlParams.get('employeeName');
            const employeePhoto = urlParams.get('employeePhoto');

            if (employeeId && currentUser) {
                await startConversationWith(employeeId, decodeURIComponent(employeeName || ''), decodeURIComponent(employeePhoto || ''));
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // بدء محادثة مع موظف
        async function startConversationWith(partnerId, partnerName, partnerPhoto) {
            currentPartnerId = partnerId;
            currentPartnerData = {
                name: partnerName || 'موظف',
                photo: partnerPhoto || 'https://randomuser.me/api/portraits/men/32.jpg'
            };

            // تحديث الواجهة
            chatPartnerName.textContent = currentPartnerData.name;
            chatPartnerAvatar.src = currentPartnerData.photo;
            chatPartnerInfo.textContent = 'غير متصل';
            chatPartnerStatus.className = 'offline-status';
            viewProfileLink.href = `employee_profile.html?id=${partnerId}`;
            inputArea.classList.remove('hidden');

            if (window.innerWidth < 768) {
                conversationsSidebar.classList.add('hidden-mobile');
                chatWindow.classList.remove('hidden-mobile');
            }

            loadMessagesForPartner(partnerId);
        }

        // تحميل المحادثات من مجموعة messages الواحدة
        function loadConversations() {
            if (!currentUser) return;

            // الاستماع لجميع الرسائل التي تشمل المستخدم الحالي
            const q = query(
                collection(db, "messages"),
                or(
                    where("senderId", "==", currentUser.uid),
                    where("receiverId", "==", currentUser.uid)
                ),
                orderBy("timestamp", "desc")
            );

            unsubscribeConversations = onSnapshot(q, (snapshot) => {
                allMessages = [];
                snapshot.forEach(doc => {
                    allMessages.push({ id: doc.id, ...doc.data() });
                });

                buildConversationsList();
            }, (error) => {
                console.error('خطأ في تحميل الرسائل:', error);
                // محاولة بديلة بدون or
                loadConversationsFallback();
            });
        }

        // طريقة بديلة لتحميل المحادثات
        async function loadConversationsFallback() {
            if (!currentUser) return;

            try {
                // جلب الرسائل المرسلة
                const sentQuery = query(
                    collection(db, "messages"),
                    where("senderId", "==", currentUser.uid),
                    orderBy("timestamp", "desc")
                );
                const sentSnapshot = await getDocs(sentQuery);

                // جلب الرسائل المستلمة
                const receivedQuery = query(
                    collection(db, "messages"),
                    where("receiverId", "==", currentUser.uid),
                    orderBy("timestamp", "desc")
                );
                const receivedSnapshot = await getDocs(receivedQuery);

                allMessages = [];
                sentSnapshot.forEach(doc => allMessages.push({ id: doc.id, ...doc.data() }));
                receivedSnapshot.forEach(doc => allMessages.push({ id: doc.id, ...doc.data() }));

                // ترتيب حسب الوقت تنازلياً
                allMessages.sort((a, b) => {
                    const timeA = a.timestamp?.seconds || 0;
                    const timeB = b.timestamp?.seconds || 0;
                    return timeB - timeA;
                });

                buildConversationsList();
            } catch (error) {
                console.error('خطأ في الطريقة البديلة:', error);
                conversationsList.innerHTML = `
                    <div class="p-8 text-center text-gray-400">
                        <i class="fas fa-exclamation-circle text-4xl mb-3 text-red-400"></i>
                        <p class="text-red-500">حدث خطأ في تحميل المحادثات</p>
                        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg">إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        // بناء قائمة المحادثات من الرسائل
        async function buildConversationsList() {
            conversationsMap.clear();

            // تجميع الرسائل حسب الطرف الآخر
            allMessages.forEach(msg => {
                const partnerId = msg.senderId === currentUser.uid ? msg.receiverId : msg.senderId;

                if (!conversationsMap.has(partnerId)) {
                    conversationsMap.set(partnerId, {
                        partnerId: partnerId,
                        lastMessage: msg,
                        messages: [msg],
                        unreadCount: 0
                    });
                } else {
                    const conv = conversationsMap.get(partnerId);
                    conv.messages.push(msg);
                    // تحديث آخر رسالة إذا كانت أحدث
                    const currentTime = msg.timestamp?.seconds || 0;
                    const lastTime = conv.lastMessage.timestamp?.seconds || 0;
                    if (currentTime > lastTime) {
                        conv.lastMessage = msg;
                    }
                }

                // حساب الرسائل غير المقروءة
                if (msg.receiverId === currentUser.uid && !msg.read) {
                    const conv = conversationsMap.get(partnerId);
                    conv.unreadCount++;
                }
            });

            if (conversationsMap.size === 0) {
                conversationsList.innerHTML = `
                    <div class="p-8 text-center text-gray-400">
                        <i class="fas fa-inbox text-4xl mb-3"></i>
                        <p>لا توجد محادثات بعد</p>
                        <p class="text-sm mt-2">ابدأ بالتواصل مع الموظفين من <a href="employee_listing_page.html" class="text-blue-600 hover:underline">هنا</a></p>
                    </div>
                `;
                return;
            }

            // جلب معلومات الشركاء
            const partnerIds = Array.from(conversationsMap.keys());
            const partnerDataMap = new Map();

            for (const pid of partnerIds) {
                try {
                    const empDoc = await getDoc(doc(db, 'employees', pid));
                    if (empDoc.exists()) {
                        const data = empDoc.data();
                        partnerDataMap.set(pid, {
                            name: data.name || 'موظف',
                            photo: data.profileImageUrl || 'https://randomuser.me/api/portraits/men/32.jpg'
                        });
                    } else {
                        const userDoc = await getDoc(doc(db, 'users', pid));
                        if (userDoc.exists()) {
                            const data = userDoc.data();
                            partnerDataMap.set(pid, {
                                name: data.name || 'مستخدم',
                                photo: data.profileImageUrl || 'https://randomuser.me/api/portraits/men/1.jpg'
                            });
                        } else {
                            partnerDataMap.set(pid, {
                                name: 'مستخدم',
                                photo: 'https://randomuser.me/api/portraits/men/32.jpg'
                            });
                        }
                    }
                } catch (e) {
                    partnerDataMap.set(pid, {
                        name: 'مستخدم',
                        photo: 'https://randomuser.me/api/portraits/men/32.jpg'
                    });
                }
            }

            // ترتيب المحادثات حسب آخر رسالة
            const sortedConversations = Array.from(conversationsMap.values()).sort((a, b) => {
                const timeA = a.lastMessage.timestamp?.seconds || 0;
                const timeB = b.lastMessage.timestamp?.seconds || 0;
                return timeB - timeA;
            });

            conversationsList.innerHTML = '';

            sortedConversations.forEach(conv => {
                const partnerData = partnerDataMap.get(conv.partnerId) || { name: 'مستخدم', photo: 'https://randomuser.me/api/portraits/men/32.jpg' };
                const isActive = currentPartnerId === conv.partnerId;
                const timeText = formatTime(conv.lastMessage.timestamp);
                const lastText = conv.lastMessage.text || '';
                const isSent = conv.lastMessage.senderId === currentUser.uid;

                const item = document.createElement('div');
                item.className = `conversation-item p-4 border-b border-gray-100 flex items-center gap-3 ${isActive ? 'active' : ''}`;
                item.onclick = () => openConversationWithPartner(conv.partnerId, partnerData);

                item.innerHTML = `
                    <div class="relative flex-shrink-0">
                        <img src="${partnerData.photo}" alt="${partnerData.name}" class="w-12 h-12 rounded-full object-cover">
                        <span class="offline-status"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-1">
                            <h4 class="font-semibold text-gray-800 truncate">${partnerData.name}</h4>
                            <span class="text-xs text-gray-400 flex-shrink-0">${timeText}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <p class="text-sm text-gray-500 truncate ${conv.unreadCount > 0 ? 'font-semibold text-gray-700' : ''}">
                                ${isSent ? '<i class="fas fa-check-double text-xs ml-1 text-blue-400"></i>' : ''}
                                ${lastText}
                            </p>
                            ${conv.unreadCount > 0 ? `<span class="unread-badge flex-shrink-0 mr-2">${conv.unreadCount}</span>` : ''}
                        </div>
                    </div>
                `;

                conversationsList.appendChild(item);
            });
        }

        // فتح محادثة مع شريك
        async function openConversationWithPartner(partnerId, partnerData) {
            if (!currentUser) return;

            currentPartnerId = partnerId;
            currentPartnerData = partnerData;

            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            event?.currentTarget?.classList.add('active');

            if (window.innerWidth < 768) {
                conversationsSidebar.classList.add('hidden-mobile');
                chatWindow.classList.remove('hidden-mobile');
            }

            chatPartnerName.textContent = partnerData.name;
            chatPartnerAvatar.src = partnerData.photo;
            chatPartnerInfo.textContent = 'غير متصل';
            chatPartnerStatus.className = 'offline-status';
            viewProfileLink.href = `employee_listing_page.html?id=${partnerId}`;
            inputArea.classList.remove('hidden');

            loadMessagesForPartner(partnerId);
        }

        // تحميل الرسائل لشريك محدد
        function loadMessagesForPartner(partnerId) {
            messagesArea.innerHTML = '<div class="flex justify-center p-8"><div class="loading-spinner"></div></div>';

            // تحديث حالة القراءة للرسائل الواردة
            markMessagesAsRead(partnerId);

            // الاستماع للرسائل الجديدة
            // نستخدم استعلام بسيط ثم نفلتر في الذاكرة
            const q = query(
                collection(db, "messages"),
                orderBy("timestamp", "desc"),
                limit(100)
            );

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    // فلترة الرسائل بين المستخدم الحالي والشريك
                    if ((msg.senderId === currentUser.uid && msg.receiverId === partnerId) ||
                        (msg.senderId === partnerId && msg.receiverId === currentUser.uid)) {
                        messages.push({ id: doc.id, ...msg });
                    }
                });

                // ترتيب تصاعدي
                messages.sort((a, b) => {
                    const timeA = a.timestamp?.seconds || 0;
                    const timeB = b.timestamp?.seconds || 0;
                    return timeA - timeB;
                });

                renderMessages(messages);
            }, (error) => {
                console.error('خطأ في تحميل الرسائل:', error);
                messagesArea.innerHTML = '<div class="text-center text-red-500 p-8">حدث خطأ في تحميل الرسائل</div>';
            });
        }

        // عرض الرسائل
        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesArea.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-handshake text-6xl mb-4 text-blue-200"></i>
                        <p class="text-lg font-medium">ابدأ محادثتك مع ${currentPartnerData?.name || 'الطرف الآخر'}</p>
                        <p class="text-sm mt-2 text-gray-400">أرسل رسالة للبدء</p>
                    </div>
                `;
                return;
            }

            messagesArea.innerHTML = '';
            let lastDate = null;

            messages.forEach(msg => {
                const isSent = msg.senderId === currentUser.uid;
                const messageDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();

                if (messageDate) {
                    const dateStr = formatDate(messageDate);
                    if (dateStr !== lastDate) {
                        lastDate = dateStr;
                        const dateSeparator = document.createElement('div');
                        dateSeparator.className = 'flex justify-center my-4';
                        dateSeparator.innerHTML = `<span class="text-xs text-gray-400 bg-gray-100 px-3 py-1 rounded-full">${dateStr}</span>`;
                        messagesArea.appendChild(dateSeparator);
                    }
                }

                const messageDiv = document.createElement('div');
                messageDiv.className = `flex ${isSent ? 'justify-start' : 'justify-end'} fade-in`;
                messageDiv.innerHTML = `
                    <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        <p>${escapeHtml(msg.text || '')}</p>
                        <span class="message-time ${isSent ? 'text-blue-200' : 'text-gray-400'}">
                            ${formatTime(msg.timestamp)}
                            ${isSent ? (msg.read ? '<i class="fas fa-check-double mr-1"></i>' : '<i class="fas fa-check mr-1"></i>') : ''}
                        </span>
                    </div>
                `;
                messagesArea.appendChild(messageDiv);
            });

            scrollToBottom();
        }

        // تحديث حالة القراءة
        async function markMessagesAsRead(partnerId) {
            if (!currentUser) return;

            try {
                const q = query(
                    collection(db, "messages"),
                    where("senderId", "==", partnerId),
                    where("receiverId", "==", currentUser.uid),
                    where("read", "==", false)
                );

                const snapshot = await getDocs(q);
                snapshot.forEach(async (docSnapshot) => {
                    await updateDoc(doc(db, "messages", docSnapshot.id), {
                        read: true
                    });
                });
            } catch (error) {
                console.error('خطأ في تحديث حالة القراءة:', error);
            }
        }

        // إرسال رسالة
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const text = messageInput.value.trim();
            if (!text || !currentPartnerId || !currentUser) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    senderId: currentUser.uid,
                    senderName: userName.textContent || 'مستخدم',
                    senderPhoto: userAvatar.src,
                    receiverId: currentPartnerId,
                    receiverName: currentPartnerData?.name || 'موظف',
                    receiverPhoto: currentPartnerData?.photo || '',
                    timestamp: serverTimestamp(),
                    read: false
                });

                messageInput.value = '';
                messageInput.style.height = '44px';
                scrollToBottom();
            } catch (error) {
                console.error('خطأ في إرسال الرسالة:', error);
                alert('حدث خطأ أثناء إرسال الرسالة: ' + error.message);
            } finally {
                sendBtn.disabled = false;
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                messageForm.dispatchEvent(new Event('submit'));
            }
        });

        backToList.addEventListener('click', () => {
            conversationsSidebar.classList.remove('hidden-mobile');
            chatWindow.classList.add('hidden-mobile');
            currentPartnerId = null;
            if (unsubscribeMessages) {
                unsubscribeMessages();
                unsubscribeMessages = null;
            }
        });

        function formatTime(timestamp) {
            if (!timestamp) return '';

            let date;
            if (timestamp.toDate) {
                date = timestamp.toDate();
            } else if (timestamp instanceof Date) {
                date = timestamp;
            } else if (typeof timestamp === 'object' && timestamp.seconds) {
                date = new Date(timestamp.seconds * 1000);
            } else {
                return '';
            }

            const now = new Date();
            const diff = now - date;

            if (diff < 24 * 60 * 60 * 1000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            }

            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.getDate() === yesterday.getDate() && date.getMonth() === yesterday.getMonth()) {
                return 'أمس';
            }

            if (diff < 7 * 24 * 60 * 60 * 1000) {
                const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                return days[date.getDay()];
            }

            return date.toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' });
        }

        function formatDate(date) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const messageDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

            if (messageDate.getTime() === today.getTime()) return 'اليوم';

            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (messageDate.getTime() === yesterday.getTime()) return 'أمس';

            return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const menuButton = document.getElementById('mobile-menu-button');
        const closeButton = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');

        menuButton.addEventListener('click', () => mobileMenu.classList.add('open'));
        closeButton.addEventListener('click', () => mobileMenu.classList.remove('open'));

        window.addEventListener('beforeunload', () => {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeConversations) unsubscribeConversations();
        });

        // تعريف الدوال في الـ window للوصول من HTML
        window.openConversationWithPartner = openConversationWithPartner;
    </script>
</body>
</html>
